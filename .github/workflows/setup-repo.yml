name: Setup — New Repo Bootstrap

# Run this ONCE after creating a new project repo from the template.
# Go to Actions → "Setup — New Repo Bootstrap" → Run workflow.
#
# What it does:
#   - Creates all standard labels (code-review, bug, feature, priority…)
#   - Does not configure branch protection (set it manually)

on:
  workflow_dispatch:

jobs:
  setup:
    name: Bootstrap Repo
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: lhuasheng/shared-sdlc/actions/setup-repo@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
